colorScheme = "blowfish"
defaultAppearance = "dark"

# Custom branding
[branding]
  logo = "me.webp"

# Default image for social sharing (Open Graph & Twitter Cards) – used when no featured image
defaultSocialImage = "me.webp"
  favicon = "/favicon.ico"
  customCSS = ["css/custom.css"]

[homepage]
  layout = "background"
  showRecent = true
  showRecentItems = 5
  homepageImage = "background.webp"
  # Nowe opcje
  showMoreLink = true
  moreLinkText = "Zobacz wszystkie artykuły"
  relatedPosts = true

[article]
  showDate = true
  showTags = true
  showReadingTime = true
  showComments = true
  # Nowe opcje
  showTableOfContents = true
  showAuthor = true
  showEditButton = true
  editURL = "https://github.com/dominikzone/dominikzone-blog/edit/main/content/"

[search]
  enable = true
  type = "fuse"
  showStandardSearch = true

[comments]
  system = "giscus"

[comments.giscus]
  repo = "dominikzone/dominikzone-blog"
  repoId = "R_kgDORVweAg"
  category = "Announcements"
  categoryId = "DIC_kwDORVweAs4C28qI"
  mapping = "pathname"
  strict = "0"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "top"
  theme = "preferred_color_scheme"
  lang = "en"

[analytics]
  provider = "umami"

[analytics.umami]
  websiteId = "7f514288-e30b-4add-82c4-71b082ceffe8"
  url = "https://cloud.umami.is/script.js"

[header]
  showLogo = true
  # Nowe opcje
  showThemeToggle = true
  showSearch = true
  showLanguageSwitch = false

[footer]
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  # Nowe opcje
  customText = "Built with ❤️ and Hugo"

[social]
  github = "https://github.com/dominikzone"
  twitter = "https://twitter.com/dominikzone"
  linkedin = "https://linkedin.com/in/dominikzone"

# Nowe sekcje
[features]
  enableCodeCopy = true
  enableImageZoom = true
  enableLazyLoading = true
  enableSmoothScroll = true